name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Verify bundle exists (POSIX)
        if: runner.os != 'Windows'
        run: test -f dist/tmx.js

      - name: Verify bundle exists (Windows)
        if: runner.os == 'Windows'
        run: Test-Path dist/tmx.js
        shell: pwsh

      - name: Smoke test (--version)
        run: node dist/tmx.js --version

      - name: Check API docs updated if API source changed
        if: github.event_name == 'pull_request' && runner.os != 'Windows'
        run: |
          API_CHANGED=$(git diff --name-only origin/main HEAD -- src/http.ts src/ipc.ts 2>/dev/null | wc -l)
          if [ "$API_CHANGED" -gt "0" ]; then
            DOCS_CHANGED=$(git diff --name-only origin/main HEAD -- docs/api.md | wc -l)
            if [ "$DOCS_CHANGED" -eq "0" ]; then
              echo "ERROR: API source changed (src/http.ts or src/ipc.ts) but docs/api.md was not updated."
              echo "Please update docs/api.md to reflect the API changes."
              exit 1
            fi
          fi

  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: operad init (fresh HOME)
        run: |
          export HOME=$(mktemp -d)
          node dist/tmx.js init
          test -f "$HOME/.config/operad/operad.toml" || (echo "init did not create config" && exit 1)
          echo "Config created:"
          cat "$HOME/.config/operad/operad.toml"

      - name: operad doctor (fresh install, expect only warnings not failures)
        run: |
          export HOME=$(mktemp -d)
          node dist/tmx.js init
          node dist/tmx.js doctor || echo "doctor reported issues (expected on CI)"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: Build CLI
        run: bun run build

      - name: Build dashboard
        run: cd dashboard && bun install && bun run build

      - name: E2E tests
        run: bun test src/__tests__/e2e.test.ts --timeout 60000

  # Validates the 'fresh machine' story: no tmux preinstalled, install
  # operadic from a packed tarball (simulating `bun add -g operadic`),
  # then run `operad install-tmux --yes` and verify tmux becomes
  # callable. Catches regressions in the install-tmux package-manager
  # detection + invocation path that normal CI doesn't exercise
  # (because the build matrix has tmux preinstalled for other tests).
  fresh-install-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Remove preinstalled tmux
        run: |
          sudo apt-get remove -y tmux || true
          if command -v tmux >/dev/null 2>&1; then
            echo "ERROR: tmux still on PATH after remove" >&2
            exit 1
          fi

      - name: Install deps + build + pack
        run: |
          bun install
          bun run build
          npm pack
          ls -la operadic-*.tgz

      # bun add -g doesn't resolve local tarball paths — use npm for install,
      # which puts the binary on standard PATH (/usr/local/bin/operad). This
      # still exercises the same dist/tmx.js bundle and bin mapping.
      - name: Install from tarball globally (npm)
        run: |
          sudo npm install -g "$(ls operadic-*.tgz | head -1)"
          which operad
          operad --version

      - name: Verify tmux is NOT on PATH (control check)
        run: |
          if command -v tmux >/dev/null 2>&1; then
            echo "tmux unexpectedly present" >&2
            exit 1
          fi
          echo "confirmed: tmux not installed"

      - name: Run operad install-tmux --yes
        run: operad install-tmux -y

      - name: Verify tmux is NOW on PATH
        run: |
          tmux -V
          echo "tmux installed successfully via operad install-tmux"

      - name: operad init + doctor on fresh HOME
        run: |
          export HOME=$(mktemp -d)
          operad init
          operad doctor || echo "(doctor may warn — non-fatal for this check)"

  fresh-install-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps + build + pack
        run: |
          bun install
          bun run build
          npm pack
          Get-ChildItem operadic-*.tgz

      # bun add -g doesn't resolve local tarball paths on Windows either
      - name: Install from tarball globally (npm)
        run: |
          $tarball = (Get-ChildItem operadic-*.tgz | Select-Object -First 1).Name
          npm install -g ".\$tarball"
          operad --version

      - name: Verify winget is available (prereq for install-tmux test)
        run: |
          winget --version
          # Confirm the package exists before attempting install
          winget show --id arndawg.tmux-windows --exact || {
            Write-Host "arndawg.tmux-windows not in winget source — skipping install attempt"
            exit 0
          }

      # NOTE: We don't actually run `operad install-tmux -y` on Windows because
      # winget install in GitHub runners needs msstore source acceptance + UAC
      # negotiation that's hard to script non-interactively. Instead we verify
      # the command runs, prints the correct guidance, and exits cleanly.
      - name: operad install-tmux (dry — non-interactive path)
        run: |
          # No TTY → installer prints instructions and exits 0
          operad install-tmux
        continue-on-error: true

      - name: operad doctor (expect tmux-windows WARN with winget fix hint)
        run: |
          $output = operad doctor 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "winget") {
            Write-Error "Expected doctor output to mention winget when tmux missing"
            exit 1
          }
        continue-on-error: true

