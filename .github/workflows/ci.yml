name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Verify bundle exists
        run: test -f dist/tmx.js

      - name: Smoke test (--version)
        run: node dist/tmx.js --version

  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: operad init (fresh HOME)
        run: |
          export HOME=$(mktemp -d)
          node dist/tmx.js init
          test -f "$HOME/.config/operad/operad.toml" || (echo "init did not create config" && exit 1)
          echo "Config created:"
          cat "$HOME/.config/operad/operad.toml"

      - name: operad doctor (fresh install, expect only warnings not failures)
        run: |
          export HOME=$(mktemp -d)
          node dist/tmx.js init
          node dist/tmx.js doctor || echo "doctor reported issues (expected on CI)"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: Build CLI
        run: bun run build

      - name: Build dashboard
        run: cd dashboard && bun install && bun run build

      - name: E2E tests
        run: bun test src/__tests__/e2e.test.ts --timeout 60000
