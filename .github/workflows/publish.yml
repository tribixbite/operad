name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # Node 24 ships with npm >= 11.5.1, required for OIDC trusted publishing.
      # Node 22 ships with npm 10.x which silently falls back to token auth.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Publish via trusted publisher (OIDC). Configured on npmjs.com:
      #   Package settings → Access → Trusted Publishers
      #   Repo: tribixbite/operad, Workflow: .github/workflows/publish.yml
      # `id-token: write` (granted above) lets npm exchange the GitHub OIDC
      # token for an npm publish token. NO NPM_TOKEN secret needed.
      #
      # CRITICAL: do NOT set NODE_AUTH_TOKEN here. setup-node injects an
      # empty `_authToken=` line into .npmrc when the secret is unset,
      # which makes npm think auth is configured and skip OIDC → ENEEDAUTH.
      - name: Publish
        run: npm publish --provenance --access public
