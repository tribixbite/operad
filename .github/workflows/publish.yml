name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Publish auth — requires ONE of these configured by repo owner:
      #   (A) Trusted publisher configured on npmjs.com
      #       (Settings → Access → Trusted Publishers, repo: tribixbite/operad,
      #        workflow: .github/workflows/publish.yml, environment: optional).
      #       Works automatically via OIDC with `id-token: write` permission above.
      #       Note: requires npm >= 11.5.1 on the runner; setup-node@v4 bundles
      #       npm 10.x with node 22, so trusted publishing via CLI may need a
      #       npm upgrade step here if OIDC isn't honoured.
      #   (B) Legacy classic token in repo secrets as NPM_TOKEN.
      #       Classic tokens work with any npm version.
      #
      # If both are configured, NODE_AUTH_TOKEN takes precedence.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
