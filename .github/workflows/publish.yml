name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1 for OIDC flow.
      # Node 22 ships with npm 10.x; upgrade to latest stable.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Two auth paths supported:
      # (1) Trusted publishing via OIDC — requires publisher registered on
      #     npmjs.com (Settings → Access → Trusted Publishers) for this repo
      #     and workflow file. `id-token: write` permission is granted above.
      # (2) Legacy token — if NPM_TOKEN secret is set, it's used instead.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
